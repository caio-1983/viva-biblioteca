services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${POSTGRES_DB}"
      POSTGRES_USER:     "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço efêmero: aplica migrations e seeds, depois encerra (exit 0).
  # A aplicação só sobe após este serviço completar com sucesso.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    image: viva-biblioteca-migrator:latest
    container_name: biblioteca-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV:     production
      DATABASE_URL: "${DATABASE_URL}"

  biblioteca:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: viva-biblioteca:latest
    container_name: viva-biblioteca
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "3002:3000"
    environment:
      NODE_ENV:                production
      PORT:                    "3000"
      APP_URL:                 "${APP_URL}"
      AUTH_URL:                "${AUTH_URL}"
      AUTH_SECRET:             "${AUTH_SECRET}"
      AUTH_TRUST_HOST:         "${AUTH_TRUST_HOST}"
      DATABASE_URL:            "${DATABASE_URL}"
      STORAGE_PATH:            "${STORAGE_PATH}"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
