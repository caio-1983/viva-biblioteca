services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d biblioteca"]
      interval: 10s
      timeout: 5s
      retries: 5

  biblioteca:
    build: .
    container_name: biblioteca
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3002:3000"
    volumes:
      - ./storage:/app/storage
    environment:
      DATABASE_URL: postgresql://biblioteca:biblioteca@postgres:5432/biblioteca
      NODE_ENV: production

volumes:
  postgres_data:
