services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: biblioteca
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblioteca -d biblioteca"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Serviço efêmero: aplica migrations e seeds, depois encerra (exit 0).
  # A aplicação só sobe após este serviço completar com sucesso.
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    image: viva-biblioteca-migrator:latest
    container_name: biblioteca-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://biblioteca:biblioteca@postgres:5432/biblioteca"

  biblioteca:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: viva-biblioteca:latest
    container_name: viva-biblioteca
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      APP_URL: "http://localhost:3002"
      DATABASE_URL: "postgresql://biblioteca:biblioteca@postgres:5432/biblioteca"
      STORAGE_PATH: "/app/storage"
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
